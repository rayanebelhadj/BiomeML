# ==============================================================================
# EXPERIMENTS FOR IBD RESEARCH
# ==============================================================================
# Run with: pixi run python run_experiments.py --experiments <name> --num-runs 50

# ==============================================================================
# BASELINE EXPERIMENTS (IBD)
# ==============================================================================

baseline:
  name: baseline
  description: Standard GINEConv with phylogenetic graph
  disease: ibd
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

# ==============================================================================
# DISTANCE MATRIX EXPERIMENTS (Phase 2)
# ==============================================================================

distance_tree:
  name: distance_tree
  description: Use phylogenetic tree distance matrix
  disease: ibd
  data_extraction:
    distance_matrices:
      primary_matrix: TreeDistMatrix
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

distance_sequence:
  name: distance_sequence
  description: Use sequence similarity distance matrix
  disease: ibd
  data_extraction:
    distance_matrices:
