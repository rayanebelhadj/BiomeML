# ==============================================================================
# EDGE WEIGHT STRATEGIES (9 strategies)
# ==============================================================================

edge_identity:
  name: edge_identity
  description: Edge weight = raw distance
  disease: ibd
  graph_construction:
    weights:
      strategy: identity
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

edge_inverse:
  name: edge_inverse
  description: Edge weight = 1/distance
  disease: ibd
  graph_construction:
    weights:
      strategy: inverse
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

edge_exponential:
  name: edge_exponential
  description: Edge weight = exp(-distance)
  disease: ibd
  graph_construction:
    weights:
      strategy: exponential
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

edge_binary:
  name: edge_binary
  description: Binary edges (no weights)
  disease: ibd
  graph_construction:
    weights:
      strategy: binary
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

edge_abundance_product:
  name: edge_abundance_product
  description: Edge weight = (1/d) × a₁ × a₂ (Professor's suggestion)
  disease: ibd
  graph_construction:
    weights:
      strategy: abundance_product
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

edge_abundance_geometric:
  name: edge_abundance_geometric
  description: Edge weight = (1/d) × sqrt(a₁ × a₂)
  disease: ibd
  graph_construction:
    weights:
      strategy: abundance_geometric
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

edge_abundance_log:
  name: edge_abundance_log
  description: Edge weight = (1/d) × log(1+a₁) × log(1+a₂)
  disease: ibd
  graph_construction:
    weights:
      strategy: abundance_log
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

edge_abundance_min:
  name: edge_abundance_min
  description: Edge weight = (1/d) × min(a₁, a₂)
  disease: ibd
  graph_construction:
    weights:
      strategy: abundance_min
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

edge_abundance_max:
  name: edge_abundance_max
  description: Edge weight = (1/d) × max(a₁, a₂)
  disease: ibd
  graph_construction:
    weights:
      strategy: abundance_max
  model_training:
    architecture:
      model_type: GINEConv
      hidden_dim: 64
      num_layers: 3
      dropout: 0.2
    training:
      batch_size: 16
      learning_rate: 0.01
      num_epochs: 200

